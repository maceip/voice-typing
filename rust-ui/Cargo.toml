[package]
name = "daydream"
version = "0.1.0"
edition = "2024"
default-run = "daydream"

[[bin]]
name = "daydream"
path = "src/main.rs"

[features]
default = []
extensions = ["dep:daydream-ext"]

[dependencies]
anyhow = "1.0"
daydream-asr = { path = "../rust-asr" }
daydream-core = { path = "../rust-core" }
daydream-ext = { path = "../rust-ext", optional = true }
daydream-platform-windows = { path = "../rust-platform-windows" }
futures-util = "0.3"
iced = { version = "0.14.0", features = ["tokio", "svg", "canvas"] }
serde_json = "1"
tokio = { version = "1.48.0", features = ["rt", "rt-multi-thread", "sync", "net", "macros"] }
tokio-tungstenite = "0.26"
