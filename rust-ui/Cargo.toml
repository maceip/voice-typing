[package]
name = "voice-typing"
version = "0.1.0"
edition = "2024"
default-run = "voice-typing"

[[bin]]
name = "voice-typing"
path = "src/main.rs"

[features]
default = []
extensions = ["dep:voice-typing-ext"]

[dependencies]
anyhow = "1.0"
voice-typing-asr = { path = "../rust-asr" }
voice-typing-core = { path = "../rust-core" }
voice-typing-ext = { path = "../rust-ext", optional = true }
voice-typing-platform-windows = { path = "../rust-platform-windows" }
futures-util = "0.3"
iced = { version = "0.14.0", features = ["tokio", "svg", "canvas"] }
serde_json = "1"
tokio = { version = "1.48.0", features = ["rt", "rt-multi-thread", "sync", "net", "macros"] }
tokio-tungstenite = "0.26"
